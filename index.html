<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Queer Fashion — Build A Conversation</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,900;1,400&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-color: #f8f8f8;
    --text-main: #111;
    --text-dim: #666;
  }

  body {
    background: var(--bg-color);
    color: var(--text-main);
    font-family: 'Inter', sans-serif;
    overflow: hidden; 
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    background: #fff;
    padding: 1rem;
    text-align: center;
    border-bottom: 1px solid #eee;
    z-index: 10;
  }
  .header-title {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 1.1rem;
  }
  .header-tabs {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 0.8rem;
    font-size: 0.85rem;
    color: #999;
  }
  .tab.active {
    color: #000;
    font-weight: 600;
    border-bottom: 2px solid #000;
    padding-bottom: 0.2rem;
  }

  /* ── CAROUSEL AREA ── */
  .wardrobe-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-evenly;
    padding: 1rem 0;
    overflow: hidden;
  }

  .carousel-row {
    display: flex;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
    height: 28vh; 
    align-items: center;
  }
  
  .carousel-row::-webkit-scrollbar { display: none; }
  .carousel-row { -ms-overflow-style: none; scrollbar-width: none; }

  .card-wrapper {
    flex: 0 0 100vw;
    height: 90%;
    scroll-snap-align: center;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 0 2rem;
  }

  .item-card {
    width: 100%;
    max-width: 320px;
    height: 100%;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 1.5rem;
    position: relative;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .item-card:active { transform: scale(0.98); }

  /* Look specific */
  .item-card.look { padding: 0; overflow: hidden; background: transparent; box-shadow: none; }
  .item-card.look img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    mix-blend-mode: multiply; 
  }
  .look-label {
    position: absolute;
    bottom: 0px;
    background: rgba(255,255,255,0.9);
    padding: 0.2rem 0.5rem;
    font-size: 0.7rem;
    font-weight: 600;
    border-radius: 4px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }
  .tap-hint {
    position: absolute;
    top: 0px;
    right: 0px;
    background: #000;
    color: #fff;
    font-size: 0.5rem;
    padding: 0.2rem 0.4rem;
    border-radius: 4px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* Quote specific */
  .item-card.quote { background: #fdfbf7; border: 1px solid #eae8e3; }
  .quote-text {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1.1rem;
    line-height: 1.4;
  }
  .quote-author {
    margin-top: 0.8rem;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
  }

  /* Provocation specific */
  .item-card.provocation { background: #111; color: #fff; }
  .provocation-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 1.25rem;
    text-transform: uppercase;
    line-height: 1.2;
  }

  /* ── BOTTOM NAV & SHUFFLE ── */
  .bottom-nav {
    background: #fff;
    padding: 1rem 1.5rem 2rem;
    border-top: 1px solid #eee;
    display: flex;
    justify-content: center;
    position: relative;
  }

  .shuffle-btn {
    background: #222;
    color: #fff;
    border: none;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    font-size: 1.8rem;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    position: absolute;
    top: -30px;
  }
  .shuffle-btn:active { transform: scale(0.95); }

  /* ── DETAIL MODAL ── */
  .modal {
    position: fixed;
    top: 100%;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: #0d0d0d;
    color: #f0ede8;
    z-index: 100;
    display: flex;
    flex-direction: column;
    transition: top 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    overflow-y: auto;
  }
  .modal.open { top: 0; }

  .modal-nav {
    position: sticky;
    top: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.2rem 1.5rem;
    background: rgba(13, 13, 13, 0.95);
    z-index: 101;
  }
  .btn-close {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    background: none;
    border: none;
    color: #888;
    cursor: pointer;
  }
  .btn-close:active { color: #fff; }

  .modal-content { padding: 2rem 1.5rem 4rem; flex: 1; display: flex; flex-direction: column;}
  .modal-tag {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 0.5rem;
  }
  .modal-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 2.2rem;
    line-height: 1.0;
    text-transform: uppercase;
    margin-bottom: 1.2rem;
  }
  .modal-desc {
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    line-height: 1.7;
    color: #aaa;
    font-weight: 300;
    margin-bottom: 2.5rem;
  }
  .question-block {
    background: #1a1a1a;
    padding: 1.5rem;
    border-left: 2px solid #f0ede8;
  }
  .question-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 0.8rem;
  }
  .question-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-style: italic;
    line-height: 1.4;
  }
  
  .quote-mark {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 5rem;
    font-weight: 900;
    color: #222;
    line-height: 0.5;
    margin-top: 2rem;
  }
</style>
</head>
<body>

<header>
  <div class="header-title">Discuss</div>
  <div class="header-tabs">
    <div class="tab active">Build Combo</div>
    <div class="tab" style="opacity: 0.5;">Pairs</div>
  </div>
</header>

<div class="wardrobe-container">
  <div class="carousel-row" id="row-looks"></div>
  <div class="carousel-row" id="row-quotes"></div>
  <div class="carousel-row" id="row-provocations"></div>
</div>

<div class="bottom-nav">
  <button class="shuffle-btn" onclick="shuffleAll()">🎲</button>
</div>

<!-- ITEM DETAIL MODAL -->
<div class="modal" id="item-modal">
  <div class="modal-nav">
    <button class="btn-close" onclick="closeModal()">↓ Close</button>
  </div>
  <div class="modal-content" id="modal-body"></div>
</div>

<script>
// --- FULL ORIGINAL DATA ---
const looks = [
  { designer: "Yves Saint Laurent", name: "Le Smoking, 1966", desc: "A tuxedo suit designed for women. Stores refused to sell it. Women were turned away from restaurants for wearing it. YSL kept making it for 40 years. It didn't just change fashion — it changed what women were allowed to look like in public.", img: "ysl-1.jpg", prompt: "If a piece of clothing can be dangerous enough to get you turned away from a restaurant — what does that tell you about who owns public space?" },
  { designer: "Alexander McQueen", name: "Bumster Trousers, 1994", desc: "Cut so low they exposed the base of the spine — what McQueen called 'the most erotic part of the body.' The press called it obscene. Designers copied it within two years. McQueen said he wanted to elongate the body and create something new. He did.", img: "mcqueen-1.jpg", prompt: "Who gets to decide what a body is allowed to show — and have you ever felt that line drawn around you?" },
  { designer: "David Bowie", name: "Ziggy Stardust, 1972", desc: "A lightning bolt across the face. Platform boots. A costume that became a person. Bowie didn't just dress differently — he became someone else entirely. He said Ziggy allowed him to do things David couldn't. Fashion as alter ego.", img: "bowie-1.jpg", prompt: "Have you ever put on something and felt like a different version of yourself — and was that version more honest or less?" },
  { designer: "RuPaul", name: "Supermodel Era, 1993", desc: "With the release of 'Supermodel (You Better Work)', RuPaul brought drag firmly into mainstream MTV and global pop culture. The fashion world had ignored drag for decades while quietly stealing from it. This cultural reset made that impossible to pretend.", img: "rupaul-1.jpg", prompt: "Fashion has been taking from queer culture for decades — what's the difference between inspiration and erasure?" },
  { designer: "Patricia Field", name: "Style on Screen", desc: "From Carrie Bradshaw's iconic $5 costume shop tutu worn with a designer top, to the masterful high-fashion metamorphosis in The Devil Wears Prada. Field's entire approach is about mixing the 'wrong' things until they become right. The wrong thing, worn with total confidence, becomes fashion.", img: "field-1.jpg", prompt: "Is there something you'd wear if you had more — or less — of something? More money, more nerve, fewer people watching?" },
  { designer: "Edward Enninful", name: "Forces for Change", desc: "Guest-edited by Meghan Markle, this British Vogue cover famously highlighted 15 trailblazing women, ranging from activists to actors, arranged in a grid with an empty 16th mirror intended to reflect the reader.", img: "enninful-1.jpg", prompt: "When fashion explicitly reflects the reader rather than an unattainable ideal, does it change the purpose of the magazine?" }
];

const quotes = [
  { text: "We are all born naked. The rest is drag.", author: "RuPaul", prompt: "Do you agree — or is there a difference between performance and identity?" },
  { text: "I want people to be afraid of the women I dress.", author: "Alexander McQueen", prompt: "What does it mean to dress with the intention of being feared — and have you ever done it?" },
  { text: "Fashions fade, style is eternal.", author: "Yves Saint Laurent", prompt: "What's the difference between fashion and style — and which one do you have?" },
  { text: "Clothing is a form of self-expression. There are hints about who you are in what you wear.", author: "Marc Jacobs", prompt: "What are you saying right now — with what you're wearing tonight?" },
  { text: "Fashion is not something that exists in dresses only. Fashion is in the sky, in the street. Fashion has to do with ideas, the way we live, what is happening.", author: "Coco Chanel", prompt: "If fashion is everywhere — are you making a statement right now whether you want to or not?" },
  { text: "Fashion is the armor to survive the reality of everyday life.", author: "Bill Cunningham", prompt: "What are you protecting yourself from — or projecting — with what you wear?" },
  { text: "Style is a way to say who you are without having to speak.", author: "Rachel Zoe", prompt: "What has your style said about you that you never said out loud?" },
  { text: "I don't do fashion. I am fashion.", author: "Coco Chanel", prompt: "What would it take for you to feel that way about yourself?" }
];

const provocations = [
  "Harry Styles wore a dress on a magazine cover and got called brave. Drag queens have been doing it for decades and got called a threat. What's the actual difference?",
  "Your $8 t-shirt was made by someone who'll never earn in a month what you spent on dinner tonight. Does that bother you, or did you train yourself to stop noticing?",
  "Are models art, or are they product?",
  "A straight-size model walks the runway. A plus-size model does a 'campaign.' Is that the industry's taste, or its training?",
  "Luxury houses have burned unsold stock rather than discount it. Is that protecting the brand — or admitting the customer was never really the point?",
  "If a queer subculture invents a look and a straight celebrity gets the magazine cover for it, who actually owns a trend?",
  "Would you still be wearing this outfit if no one here was watching you wear it?",
  "Runways are full of bodies under 25. Where did everyone older go — and would fashion actually want them back if they returned?",
  "Is 'ethical fashion' a real category, or a price tag for guilt?",
  "If everyone at this table could see exactly what your outfit cost — all of it — would you still have worn it tonight?"
];

function populateRow(containerId, data, type) {
  const container = document.getElementById(containerId);
  data.forEach((item, index) => {
    const wrapper = document.createElement('div');
    wrapper.className = 'card-wrapper';
    
    let innerHTML = '';
    if (type === 'look') {
      innerHTML = `<div class="item-card look" onclick="openModal('look', ${index})">
                     <div class="tap-hint">Tap to read</div>
                     <img src="${item.img}" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' fill=\\'%23ddd\\' viewBox=\\'0 0 24 24\\'><rect width=\\'24\\' height=\\'24\\'/></svg>'" alt="">
                     <div class="look-label">${item.name}</div>
                   </div>`;
    } else if (type === 'quote') {
      innerHTML = `<div class="item-card quote" onclick="openModal('quote', ${index})">
                     <div class="tap-hint" style="background:#ddd; color:#111;">Tap to read</div>
                     <div class="quote-text">"${item.text}"</div>
                     <div class="quote-author">${item.author}</div>
                   </div>`;
    } else if (type === 'provocation') {
      innerHTML = `<div class="item-card provocation">
                     <div class="provocation-text">${item}</div>
                   </div>`;
    }
    
    wrapper.innerHTML = innerHTML;
    container.appendChild(wrapper);
  });
}

populateRow('row-looks', looks, 'look');
populateRow('row-quotes', quotes, 'quote');
populateRow('row-provocations', provocations, 'provocation');

function shuffleAll() {
  const rows = [
    { el: document.getElementById('row-looks'), count: looks.length },
    { el: document.getElementById('row-quotes'), count: quotes.length },
    { el: document.getElementById('row-provocations'), count: provocations.length }
  ];

  rows.forEach(row => {
    const randomIdx = Math.floor(Math.random() * row.count);
    const scrollPos = randomIdx * window.innerWidth;
    row.el.scrollTo({ left: scrollPos, behavior: 'smooth' });
  });
}

// Modal Logic
const modal = document.getElementById('item-modal');
const modalBody = document.getElementById('modal-body');

function openModal(type, index) {
  let content = '';
  if (type === 'look') {
    const item = looks[index];
    content = `
      <div class="modal-tag">${item.designer}</div>
      <div class="modal-title">${item.name}</div>
      <div class="modal-desc">${item.desc}</div>
      <div class="question-block">
        <div class="question-label">Bring to the table</div>
        <div class="question-text">${item.prompt}</div>
      </div>
    `;
  } else if (type === 'quote') {
    const item = quotes[index];
    content = `
      <div class="quote-mark">"</div>
      <div class="question-text" style="font-size: 2rem; margin-bottom: 1rem;">${item.text}</div>
      <div class="modal-tag" style="margin-bottom: 3rem;">— ${item.author}</div>
      <div class="question-block">
        <div class="question-label">Bring to the table</div>
        <div class="question-text">${item.prompt}</div>
      </div>
    `;
  }
  
  modalBody.innerHTML = content;
  modal.classList.add('open');
}

function closeModal() {
  modal.classList.remove('open');
}
</script>
</body>
</html>
