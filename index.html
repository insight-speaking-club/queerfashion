  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --black: #060606; --white: #f0ede8; --grey: #1a1a1a; --dim: #666; --accent: #c2a882; }
  body { background: var(--black); color: var(--white); font-family: 'Inter', sans-serif; overflow-x: hidden; }

  /* ── LANGUAGE TOGGLE ── */
  .lang-toggle {

    border: 1px solid #333;
    color: var(--dim);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    padding: 0.3rem 0.8rem;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .lang-toggle:hover { border-color: var(--accent); color: var(--accent); }
  .lang-toggle.active { background: var(--accent); color: var(--black); border-color: var(--accent); }

  #notif-icon { font-size: 1.2rem; flex-shrink: 0; margin-top: 2px; color: var(--accent); }
  #notif-content { flex: 1; min-width: 0; }

  #notif-text { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1rem; color: var(--white); line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #notif-dismiss { background: none; border: none; color: var(--dim); font-size: 1.2rem; cursor: pointer; flex-shrink: 0; padding: 0 0 0 0.5rem; }

  #question-text { font-family: 'Playfair Display', serif; font-style: italic; font-size: clamp(1.4rem, 6vw, 2.5rem); line-height: 1.45; color: var(--white); max-width: 600px; margin-bottom: 3rem; }
  
  .qs-actions { display: flex; gap: 1rem; align-items: center; }
  #question-close { background: none; border: 1px solid #2e2a26; color: var(--dim); font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.12em; padding: 0.6rem 1.4rem; cursor: pointer; border-radius: 2px; transition: all 0.2s; }
  #question-close:hover { border-color: var(--accent); color: var(--accent); }
