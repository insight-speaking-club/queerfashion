<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Queer Fashion — Flip the Script</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300;400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --black: #060606; --white: #f0ede8; --grey: #1a1a1a; --dim: #666; }
  body { background: var(--black); color: var(--white); font-family: 'Inter', sans-serif; overflow-x: hidden; }

  /* Hero Section */
  #hero-cover { height: 100vh; display: flex; flex-direction: column; justify-content: space-between; position: relative; background: url('cover.jpg') center/cover; }
  #hero-cover::before { content: ''; position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.9)); }
  .home-center { z-index: 1; padding: 0 1.8rem; flex: 1; display: flex; flex-direction: column; justify-content: center; }
  .cover-title { font-family: 'Barlow Condensed'; font-weight: 900; font-size: clamp(4rem, 15vw, 8rem); text-transform: uppercase; line-height: 0.85; }
  .cover-title-italic { font-family: 'Playfair Display'; font-style: italic; font-size: clamp(1.5rem, 5vw, 2.5rem); margin-top: 1rem; }
  
  /* Closets */
  #closet-section { padding: 5rem 0 8rem 0; background: #0a0a0a; }
  .row-container { margin-bottom: 6rem; }
  .row-header { padding: 0 1.8rem; margin-bottom: 2rem; }
  .row-header h3 { font-family: 'Barlow Condensed'; font-size: 1.8rem; text-transform: uppercase; }
  .row-header span { color: var(--dim); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; display: block; margin-bottom: 0.5rem; }
  .carousel-row { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; height: 320px; align-items: center; padding-left: 1.8rem; }
  .card-wrapper { flex: 0 0 80vw; height: 100%; scroll-snap-align: start; padding-right: 1.5rem; }
  .item-card { width: 100%; height: 100%; background: var(--grey); border-radius: 8px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; cursor: pointer; position: relative; overflow: hidden; }
  .look-label { position: absolute; bottom: 0; left: 0; width: 100%; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); padding: 2rem 1rem 1rem; font-family: 'Barlow Condensed'; font-weight: 700; text-transform: uppercase; text-align: left; }

  /* Modal */
  .modal { position: fixed; top: 100%; left: 0; width: 100vw; height: 100vh; background: var(--black); z-index: 100; transition: top 0.4s; overflow-y: auto; }
  .modal.open { top: 0; }
  .modal-nav { padding: 1.5rem; border-bottom: 1px solid #1a1a1a; cursor: pointer; color: var(--dim); text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.2em; }
  .modal-content-box { padding: 2rem 1.5rem; }
  .look-thumbnails { display: flex; gap: 2px; margin-top: 2px; }
  .look-thumb { flex: 1; height: 60px; background: #141414; opacity: 0.4; }
  .look-thumb.active { opacity: 1; border-bottom: 2px solid white; }
</style>
</head>
<body>

<section id="hero-cover">
  <div class="home-center">
    <h1 class="cover-title">Flip the<br>Script.</h1>
    <span class="cover-title-italic">You decide which side is right-side-up.</span>
  </div>
</section>

<section id="closet-section">
  <div class="row-container">
    <div class="row-header"><span>The Icons</span><h3>You could discuss A LOOK,</h3></div>
    <div class="carousel-row" id="row-looks"></div>
  </div>
  <div class="row-container">
    <div class="row-header"><span>Words that land</span><h3>or you could talk about A QUOTE you like,</h3></div>
    <div class="carousel-row" id="row-quotes"></div>
  </div>
  <div class="row-container">
    <div class="row-header"><span>No cushioning</span><h3>and if you're feeling bolder, pick your PROVOCATION.</h3></div>
    <div class="carousel-row" id="row-provocations"></div>
  </div>
</section>

<div class="modal" id="item-modal">
  <div class="modal-nav" onclick="closeModal()">↓ Back to Closet</div>
  <div id="modal-body-container"></div>
</div>

<script>
const looks = [
  { designer: "Yves Saint Laurent", name: "Le Smoking, 1966", desc: "A tuxedo suit designed for women. Stores refused to sell it. Women were turned away from restaurants for wearing it.", images: ["ysl-1.jpg", "ysl-2.jpg", "ysl-3.jpg"], prompt: "Who owns public space?" },
  { designer: "Alexander McQueen", name: "Bumster Trousers, 1994", desc: "Cut low, exposing the spine. The press called it obscene; others saw art.", images: ["mcqueen-1.jpg", "mcqueen-2.jpg", "mcqueen-3.jpg"], prompt: "Who decides what a body is allowed to show?" },
  { designer: "David Bowie", name: "Ziggy Stardust, 1972", desc: "A costume that became a person. Fashion as alter ego.", images: ["bowie-1.jpg", "bowie-2.jpg", "bowie-3.jpg"], prompt: "Is your style a mask or an honest self?" },
  { designer: "RuPaul", name: "Supermodel Era, 1993", desc: "RuPaul brought drag firmly into mainstream MTV, making the invisible visible.", images: ["rupaul-1.jpg", "rupaul-2.jpg", "rupaul-3.jpg"], prompt: "Inspiration vs. erasure: Where is the line?" },
  { designer: "Patricia Field", name: "Style on Screen", desc: "Mixing the 'wrong' things until they become right. Confidence makes the fashion.", images: ["field-1.jpg", "field-2.jpg", "field-3.jpg"], prompt: "What would you wear if you didn't care who was watching?" },
  { designer: "Edward Enninful", name: "Forces for Change", desc: "British Vogue cover featuring 15 trailblazing women with an empty mirror for the reader.", images: ["enninful-1.jpg", "enninful-2.jpg", "enninful-3.jpg"], prompt: "Does fashion reflecting the reader change the magazine's purpose?" }
];
const quotes = [
  { text: "We are all born naked. The rest is drag.", author: "RuPaul", prompt: "Performance vs. identity?" },
  { text: "I want people to be afraid of the women I dress.", author: "Alexander McQueen", prompt: "When has an outfit been your weapon?" },
  { text: "Fashions fade, style is eternal.", author: "Yves Saint Laurent", prompt: "Which do you have?" },
  { text: "Clothing is a form of self-expression.", author: "Marc Jacobs", prompt: "What are you saying right now?" },
  { text: "Fashion is in the sky, in the street.", author: "Coco Chanel", prompt: "Are you making a statement?" },
  { text: "Fashion is the armor to survive reality.", author: "Bill Cunningham", prompt: "What are you protecting?" },
  { text: "Style is saying who you are without speaking.", author: "Rachel Zoe", prompt: "What has your style said?" },
  { text: "I don't do fashion. I am fashion.", author: "Coco Chanel", prompt: "What would it take to feel that?" }
];
const provocations = [
  "Harry Styles in a dress = brave. Drag queens = threat. Why?", "Is 'ethical fashion' a real category, or a price tag for guilt?", "Are models art, or are they product?", "If everyone saw what your outfit cost, would you still wear it?", "Who actually owns a trend?"
];

function populateRow(containerId, data, type) {
  const container = document.getElementById(containerId);
  data.forEach((item, index) => {
    const wrapper = document.createElement('div');
    wrapper.className = 'card-wrapper';
    if (type === 'look') {
      wrapper.innerHTML = `<div class="item-card" onclick="openModal('look', ${index})"><img src="${item.images[0]}" style="width:100%; height:100%; object-fit:cover;"><div class="look-label">${item.name}</div></div>`;
    } else {
      wrapper.innerHTML = `<div class="item-card" style="padding:1.5rem" onclick="openModal('${type}', ${index})"><div style="font-family:Playfair Display; font-style:italic;">${type === 'quote' ? '"'+item.text+'"' : item}</div></div>`;
    }
    container.appendChild(wrapper);
  });
}

populateRow('row-looks', looks, 'look');
populateRow('row-quotes', quotes, 'quote');
populateRow('row-provocations', provocations, 'provocation');

function openModal(type, index) {
  const c = document.getElementById('modal-body-container');
  if (type === 'look') {
    const item = looks[index];
    const thumbs = item.images.map((img, i) => `<div class="look-thumb ${i===0?'active':''}" onclick="document.getElementById('m-img').src='${img}'"><img src="${img}" style="width:100%; height:100%; object-fit:cover;"></div>`).join('');
    c.innerHTML = `<div class="look-image-area"><img id="m-img" src="${item.images[0]}"></div><div class="look-thumbnails">${thumbs}</div><div class="modal-content-box"><h2>${item.name}</h2><p>${item.desc}</p><br><strong>Bring to the table:</strong><p>${item.prompt}</p></div>`;
  } else if (type === 'quote') {
    c.innerHTML = `<div class="modal-content-box"><h2>"${quotes[index].text}"</h2><p>— ${quotes[index].author}</p><br><strong>Bring to the table:</strong><p>${quotes[index].prompt}</p></div>`;
  } else {
    c.innerHTML = `<div class="modal-content-box"><h2>${provocations[index]}</h2></div>`;
  }
  document.getElementById('item-modal').classList.add('open');
}
function closeModal() { document.getElementById('item-modal').classList.remove('open'); }
</script>
</body>
</html>
