<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Host Controls — VOGUE?</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background-color: #030303;
    color: #f4f4f4;
    font-family: system-ui, -apple-system, sans-serif;
    padding: 1.5rem;
    overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
  }

  h1 {
    font-size: 1.5rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 1.5rem;
    text-align: center;
    color: #999;
  }

  /* Status Panel */
  .status-panel {
    background: #111;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 2rem;
  }

  .status-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 1.1rem;
    margin-bottom: 1rem;
  }
  .status-row:last-child {
    margin-bottom: 0;
  }
  
  .status-label {
    color: #999;
  }

  .status-value {
    font-weight: bold;
    text-transform: uppercase;
  }
  .status-locked, .status-closed { color: #f87171; } /* Red */
  .status-unlocked, .status-open { color: #4ade80; } /* Green */

  /* Buttons */
  .section {
    margin-bottom: 2rem;
    border-bottom: 1px solid #222;
    padding-bottom: 2rem;
  }
  .section:last-child {
    border-bottom: none;
  }

  button {
    display: block;
    width: 100%;
    padding: 1.2rem 1rem;
    margin-bottom: 1rem;
    font-size: 1.1rem;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
  }
  button:last-child {
    margin-bottom: 0;
  }
  button:active {
    transform: scale(0.96);
  }

  /* Button Themes */
  .btn-unlock { background: #333; color: #fff; border: 1px solid #555; }
  .btn-lock { background: #1a1a1a; color: #f87171; border: 1px solid #4a1c1c; }
  
  .btn-open-all { background: #e3ded8; color: #000; padding: 1.5rem 1rem; font-size: 1.2rem;}
  .btn-close-all { background: #1a1a1a; color: #999; border: 1px solid #333; }

  .btn-clear { background: transparent; color: #999; border: 1px dashed #555; }

</style>
</head>
<body>

  <h1>Host Controls</h1>

  <div class="status-panel">
    <div class="status-row">
      <span class="status-label">Closet Door:</span>
      <span class="status-value" id="status-door">Loading...</span>
    </div>
    <div class="status-row">
      <span class="status-label">Dream Closet Overlay:</span>
      <span class="status-value" id="status-overlay">Loading...</span>
    </div>
  </div>

  <div class="section">
    <button class="btn-unlock" onclick="unlockCloset(this)">1. Unlock Closet Door</button>
    <button class="btn-lock" onclick="lockCloset(this)">2. Lock Closet Door</button>
  </div>

  <div class="section">
    <button class="btn-open-all" onclick="openDreamCloset(this)">3. Force Open For Everyone</button>
    <button class="btn-close-all" onclick="closeDreamCloset(this)">4. Close For Everyone</button>
  </div>

  <div class="section">
    <button class="btn-clear" onclick="clearQuestion(this)">5. Clear Shared Question</button>
  </div>

<script>
  const DB_URL = 'https://speaking-13ce0-default-rtdb.firebaseio.com/current-question.json';
  const STAGE_URL = 'https://speaking-13ce0-default-rtdb.firebaseio.com/final-stage.json';

  // Brief visual feedback so you know you tapped it
  function showFeedback(btn) {
    const originalText = btn.innerText;
    btn.innerText = "✓ SENT";
    btn.style.opacity = '0.5';
    btn.disabled = true;
    setTimeout(() => {
      btn.innerText = originalText;
      btn.style.opacity = '1';
      btn.disabled = false;
    }, 1000);
  }

  // 1. Unlock the closet
  function unlockCloset(btn) {
    fetch(STAGE_URL, { method: 'PUT', body: JSON.stringify({ active: true, closet_open: false, ts: Date.now() }) });
    showFeedback(btn);
    pollStatus();
  }

  // 2. Lock the closet
  function lockCloset(btn) {
    fetch(STAGE_URL, { method: 'PUT', body: JSON.stringify({ active: false, closet_open: false, ts: Date.now() }) });
    showFeedback(btn);
    pollStatus();
  }

  // 3. Open Dream Closet for everyone
  function openDreamCloset(btn) {
    fetch(STAGE_URL, { method: 'PUT', body: JSON.stringify({ active: true, closet_open: true, ts: Date.now() }) });
    showFeedback(btn);
    pollStatus();
  }

  // 4. Close Dream Closet for everyone
  function closeDreamCloset(btn) {
    fetch(STAGE_URL, { method: 'PUT', body: JSON.stringify({ active: true, closet_open: false, ts: Date.now() }) });
    showFeedback(btn);
    pollStatus();
  }

  // 5. Clear the shared question
  function clearQuestion(btn) {
    fetch(DB_URL, { method: 'PUT', body: JSON.stringify({ question_en: '', question_ua: '', type: null, index: null, ts: Date.now() }) });
    showFeedback(btn);
  }

  // Poll status every 3 seconds
  async function pollStatus() {
    try {
      const res = await fetch(STAGE_URL);
      const data = await res.json();
      
      if (data) {
        const doorEl = document.getElementById('status-door');
        const overlayEl = document.getElementById('status-overlay');

        if (data.active) {
          doorEl.innerText = "Unlocked 🔓";
          doorEl.className = "status-value status-unlocked";
        } else {
          doorEl.innerText = "Locked 🔒";
          doorEl.className = "status-value status-locked";
        }

        if (data.closet_open) {
          overlayEl.innerText = "OPEN ON SCREENS 🔴";
          overlayEl.className = "status-value status-open";
        } else {
          overlayEl.innerText = "Closed ⚪";
          overlayEl.className = "status-value status-closed";
        }
      }
    } catch (e) {
      console.error("Failed to fetch status.");
    }
  }

  // Start polling
  setInterval(pollStatus, 3000);
  pollStatus();

</script>
</body>
</html>
